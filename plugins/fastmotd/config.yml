  information:
    - "<bold><light_purple>Versões recomendadas</light_purple></bold>"
    - "<bold><green>1.19</green><gray>  ->  </gray><dark_green>1.19.3</dark_green></bold>"
    - ""
    - "<bold><aqua>Versões suportadas</aqua></bold>"
    - "<bold><dark_red>1.13</dark_red><gray>  ->  </gray><dark_green>1.19.3</dark_green></bold>"
  # How frequently online player count will be updated (in ms)
  update-rate: 3000
  # VARIABLE - from max-count parameter
  # ADD_SOME - will add up the number from max-count parameter to current online players amount
  max-count-type: VARIABLE
  max-count: 20
  fake-online-add-single: 0
  fake-online-add-percent: 0
  # Accepted values: from 0.0 to 1.0.
  # Keep this value as low as possible
  # Set -1 to disable PNG recompression
  png-quality: 0.0
  log-pings: false
  # Separate MOTDs/favicons/information for different protocol versions
  # See https://wiki.vg/Protocol_version_numbers
  versions:
    # null = disabled
    descriptions: null
    # null = disabled
    favicons: null
    # null = disabled
    information: null
  domains:
    example.com:25565:
      description:
        - "Description for example.com"
      favicon:
        - "server-icon.png"
      information:
        - "Information for example.com"

maintenance:
  maintenance-enabled: false
  show-version: true
  should-kick-on-join: true
  kick-whitelist:
    - "127.0.0.1"
  kick-message: "<red>Estamos em manutenção no momento</red>{NL}<gold>Trazendo grandes novidades com essa atualização</gold>"
  version-name: "EM MANUTENÇÃO"
  descriptions:
    - "<bold><red>CDMD</red></bold>{NL} -> Em manutenção"
  favicons:
    - "server-icon.png"
  information:
    - "Saiba mais: https://blog.cdmd.dev"
  # -1 = disabled
  override-online: -1
  # -1 = disabled
  override-max-online: -1
  # Separate MOTDs/favicons/information for different protocol versions
  # See https://wiki.vg/Protocol_version_numbers
  versions:
    # null = disabled
    descriptions: null
    # null = disabled
    favicons: null
    # null = disabled
    information: null
  domains:
    example.com:25565:
      description:
        - "Description for example.com"
      favicon:
        - "server-icon.png"
      information:
        - "Information for example.com"
  command:
    usage: "{PRFX} Usage: <gold>/maintenance <off|on|toggle></gold>"

shutdown-scheduler:
  # Server will stop accepting new connections
  shutdown-scheduler-enabled: false
  # Server will shut down after everyone has left the server
  shutdown-on-zero-players: false
  whitelist:
    - "127.0.0.1"
